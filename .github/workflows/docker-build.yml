name: Docker Build & Scan

on:
  workflow_call:

jobs:
  Docker-Build-and-Security:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configuration du nom de l'image
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_TAG=ghcr.io/$REPO_LOWER:latest" >> $GITHUB_ENV

      - name: Build de l'image Docker Collector
        run: |
          docker build -t ${{ env.IMAGE_TAG }} .

      - name: Scan Trivy (SARIF pour GitHub Security)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container-scan

      - name: Scan Trivy (Bloquant avec gestion des exceptions)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          trivyignores: .trivyignore

      - name: Génération du SBOM (Software Bill of Materials)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_TAG }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Sauvegarde du fichier SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-collector-app
          path: sbom.spdx.json

      - name: Publication de l'image sur GHCR (Continuous Delivery)
        run: |
          docker push ${{ env.IMAGE_TAG }}