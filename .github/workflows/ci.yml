name: Pipeline CI/CD Collector.shop
on:
  # push:
  #   branches: [main, master]
  # pull_request:
  #   branches: [main, master]
  schedule:
    - cron: '0 7 * * *'
permissions:
  security-events: write
  contents: read
  actions: read
  issues: write
  packages: write
jobs:
  Linter-and-Tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: collector_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Installation des dépendances API
        run: |
          cd api
          npm install
      - name: Exécution des tests API
        env:
          DATABASE_URL: postgres://user:password@localhost:5432/collector_db
        run: |
          cd api
          npm test -- --passWithNoTests
      - name: Installation et Build du Client
        run: |
          cd client
          npm install
          npm run build

  Secret-Scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: true

  SAST-Semgrep:
    runs-on: ubuntu-latest
    needs: Linter-and-Tests
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        continue-on-error: true
        with:
          config: >-
            p/nodejs
            p/javascript
            p/owasp-top-ten
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  SCA-Dependency-Scan:
    runs-on: ubuntu-latest
    needs: Linter-and-Tests
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Audit des dépendances API (Backend)
        run: |
          cd api
          npm install
          npm audit --audit-level=high
      - name: Audit des dépendances Client (Frontend)
        run: |
          cd client
          npm install
          npm audit --audit-level=high || true

  Docker-Build-and-Security:
    runs-on: ubuntu-latest
    needs: Linter-and-Tests
    permissions:
      security-events: write
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Connexion à GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 🐳 Configuration du nom de l'image
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_TAG=ghcr.io/$REPO_LOWER:latest" >> $GITHUB_ENV
      - name: Build de l'image Docker Collector
        run: |
          docker build -t ${{ env.IMAGE_TAG }} .
      - name: Scan Trivy (SARIF pour GitHub Security)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container-scan
      - name: Scan Trivy (affichage table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
      - name: Génération du SBOM (Software Bill of Materials)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_TAG }}
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Sauvegarde du fichier SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-collector-app
          path: sbom.spdx.json
      - name: 📤 Publication de l'image sur GHCR (Continuous Delivery)
        run: |
          docker push ${{ env.IMAGE_TAG }}

  IaC-Security-Checkov:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Scan de l'Infrastructure (Dockerfile & Compose)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile,yaml
          output_format: sarif
          soft_fail: true 

      - name: Sauvegarde du rapport Checkov
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: results.sarif

  Load-Testing:
    runs-on: ubuntu-latest
    needs: Docker-Build-and-Security
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Démarrage de l'infrastructure
        run: |
          docker compose up -d --build
          sleep 15
      - name: Exécution du test de charge Siege (Mode Sidecar Ubuntu)
        run: |
          APP_CONTAINER=$(docker compose ps -q app)
          docker run --rm --network container:$APP_CONTAINER ubuntu:22.04 sh -c "\
            apt-get update && \
            apt-get install -y siege && \
            mkdir -p ~/.siege && \
            siege -c 20 -t 10s http://localhost:3000/articles"
      - name: Arrêt des services
        if: always()
        run: docker compose down -v

  DAST-OWASP-ZAP:
    runs-on: ubuntu-latest
    needs: Docker-Build-and-Security
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Démarrage de l'infrastructure
        run: |
          docker compose up -d --build
          sleep 15
      - name: Attaque dynamique (OWASP ZAP) via Docker
        continue-on-error: true
        run: |
          mkdir -p zap-reports
          chmod 777 zap-reports
          docker run --rm --network host \
            -v $(pwd)/zap-reports:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:3000 -r zap-report.html -I
      - name: 💾 Sauvegarde du rapport ZAP (Upload V4)
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-report
          path: zap-reports/zap-report.html

  Deploy-Production:
    runs-on: ubuntu-latest
    needs: [Load-Testing, DAST-OWASP-ZAP]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Déploiement Continu via SSH sur le VPS
        uses: appleboy/ssh-action@v1
        continue-on-error: true 
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST || '127.0.0.1' }}
          username: ${{ secrets.PRODUCTION_SSH_USER || 'root' }}
          key: ${{ secrets.PRODUCTION_SSH_KEY || 'mock-key' }}
          script: |
            echo "--- Lancement du déploiement en prod ---"
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            IMAGE_URL="ghcr.io/$REPO_LOWER:latest"
            echo "> Récupération de la nouvelle image ($IMAGE_URL)..."
            # docker pull $IMAGE_URL
            echo "> Redémarrage de l'application..."
            # docker compose -f docker-compose.prod.yml down
            # docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "> Petit coup de balai sur les anciennes images..."
            # docker image prune -f
            echo "--- Déploiement terminé avec succès ! Appli à jour. ---"