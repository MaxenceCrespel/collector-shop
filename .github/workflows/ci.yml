name: Pipeline CI/CD Collector.shop
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
permissions:
  security-events: write
  contents: read
  actions: read
jobs:
  Linter-and-Tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: collector_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Installation des dépendances API
        run: |
          cd api
          npm install
      - name: Exécution des tests API
        env:
          DATABASE_URL: postgres://user:password@localhost:5432/collector_db
        run: |
          cd api
          npm test -- --passWithNoTests
      - name: Installation et Build du Client
        run: |
          cd client
          npm install
          npm run build

  Secret-Scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: true

  SAST-Semgrep:
    runs-on: ubuntu-latest
    needs: Linter-and-Tests
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/nodejs
            p/javascript
            p/owasp-top-ten
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  SCA-Dependency-Scan:
    runs-on: ubuntu-latest
    needs: Linter-and-Tests
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Installation des dépendances API
        run: |
          cd api
          npm install
      - name: Audit des dépendances (npm audit)
        run: |
          cd api
          npm audit --audit-level=high

  Docker-Build-and-Security:
    runs-on: ubuntu-latest
    needs: Linter-and-Tests
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Build de l'image Docker Collector
        run: |
          docker build -t collector-shop-app:latest .
      - name: Scan de l'image avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "collector-shop-app:latest"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

  Load-Testing:
    runs-on: ubuntu-latest
    needs: Docker-Build-and-Security
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Démarrage de l'infrastructure
        run: |
          docker compose up -d --build
          sleep 15
      - name: Exécution du test de charge Siege (Mode Sidecar Ubuntu)
        run: |
          APP_CONTAINER=$(docker compose ps -q app)
          docker run --rm --network container:$APP_CONTAINER ubuntu:22.04 sh -c "\
            apt-get update && \
            apt-get install -y siege && \
            mkdir -p ~/.siege && \
            siege -c 20 -t 10s http://localhost:3000/articles"
      - name: Arrêt des services
        if: always()
        run: docker compose down -v
