name: Pipeline CI/CD Collector.shop

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 7 * * *"

permissions:
  security-events: write
  contents: read
  actions: read
  issues: write
  packages: write

jobs:
  Linter-and-Tests:
    uses: ./.github/workflows/linter-tests.yml

  Secret-Scanning:
    uses: ./.github/workflows/secret-scan.yml
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  SAST-Semgrep:
    needs: Linter-and-Tests
    uses: ./.github/workflows/sast-semgrep.yml

  SCA-Dependency-Scan:
    needs: Linter-and-Tests
    uses: ./.github/workflows/sca-audit.yml

  IaC-Security-Checkov:
    uses: ./.github/workflows/iac-checkov.yml

  Docker-Build-and-Security:
    needs: Linter-and-Tests
    uses: ./.github/workflows/docker-build.yml
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  Load-Testing:
    needs: Docker-Build-and-Security
    uses: ./.github/workflows/load-testing.yml

  DAST-OWASP-ZAP:
    needs: Docker-Build-and-Security
    uses: ./.github/workflows/dast-zap.yml

  E2E-Cypress:
    needs: Docker-Build-and-Security
    uses: ./.github/workflows/e2e-cypress.yml

  Deploy-Production:
    needs: [Load-Testing, DAST-OWASP-ZAP, E2E-Cypress]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    uses: ./.github/workflows/deploy.yml
    secrets:
      DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
