name: Pipeline CI/CD Collector.shop

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 7 * * *'

permissions:
  security-events: write
  contents: read
  actions: read
  issues: write
  packages: write

jobs:
  Linter-and-Tests:
    uses: ./.github/workflows/linter-tests.yml

  Secret-Scanning:
    uses: ./.github/workflows/secret-scan.yml
    secrets: inherit

  SAST-Semgrep:
    needs: Linter-and-Tests
    uses: ./.github/workflows/sast-semgrep.yml

  SCA-Dependency-Scan:
    needs: Linter-and-Tests
    uses: ./.github/workflows/sca-audit.yml

  IaC-Security-Checkov:
    uses: ./.github/workflows/iac-checkov.yml

  Docker-Build-and-Security:
    needs: Linter-and-Tests
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit

  Load-Testing:
    needs: Docker-Build-and-Security
    uses: ./.github/workflows/load-testing.yml

  DAST-OWASP-ZAP:
    needs: Docker-Build-and-Security
    uses: ./.github/workflows/dast-zap.yml

  Deploy-Production:
    needs: [Load-Testing, DAST-OWASP-ZAP]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit