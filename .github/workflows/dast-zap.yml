name: DAST ZAP

on:
  workflow_call:

jobs:
  DAST-OWASP-ZAP:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Démarrage de l'infrastructure
        run: |
          docker compose up -d --build
          sleep 15
      - name: Récupération d'un token JWT pour le scan authentifié
        run: |
          curl -s -X POST http://localhost:3000/login \
            -H "Content-Type: application/json" \
            -d '{"username":"sneakerhead75","password":"collector2026"}' \
            | python3 -c "import sys,json;print('AUTH_TOKEN='+json.load(sys.stdin)['token'])" >> "$GITHUB_ENV"
      - name: Attaque dynamique (OWASP ZAP - scan actif) via Docker
        run: |
          mkdir -p zap-reports
          chmod 777 zap-reports
          docker run --rm --network host \
            -v $(pwd)/zap-reports:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py -t http://localhost:3000 -r zap-full-report.html -l WARN \
            -z "-config replacer.full_list(0).description=auth \
                -config replacer.full_list(0).enabled=true \
                -config replacer.full_list(0).matchtype=REQ_HEADER \
                -config replacer.full_list(0).matchstr=Authorization \
                -config replacer.full_list(0).regex=false \
                -config replacer.full_list(0).replacement='Bearer\ ${AUTH_TOKEN}'"
          echo "FULL_SCAN_EXIT=$?" >> "$GITHUB_ENV"
      - name: Attaque ciblée des endpoints API (OWASP ZAP - openapi) via Docker
        run: |
          docker run --rm --network host \
            -v $(pwd)/zap-reports:/zap/wrk/:rw \
            -v $(pwd)/api/openapi.yaml:/zap/wrk/openapi.yaml:ro \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-api-scan.py -t /zap/wrk/openapi.yaml -f openapi -r zap-api-report.html -l WARN \
            -z "-config replacer.full_list(0).description=auth \
                -config replacer.full_list(0).enabled=true \
                -config replacer.full_list(0).matchtype=REQ_HEADER \
                -config replacer.full_list(0).matchstr=Authorization \
                -config replacer.full_list(0).regex=false \
                -config replacer.full_list(0).replacement='Bearer\ ${AUTH_TOKEN}'"
          echo "API_SCAN_EXIT=$?" >> "$GITHUB_ENV"
      - name: Sauvegarde des rapports ZAP (Upload V4)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-reports
          path: |
            zap-reports/zap-full-report.html
            zap-reports/zap-api-report.html
      - name: Échec du job si des alertes ont été trouvées
        run: |
          echo "Scan complet: exit $FULL_SCAN_EXIT / Scan API: exit $API_SCAN_EXIT"
          if [ "${FULL_SCAN_EXIT:-0}" -ne 0 ] || [ "${API_SCAN_EXIT:-0}" -ne 0 ]; then
            echo "Des alertes OWASP ZAP ont été détectées."
            exit 1
          fi
