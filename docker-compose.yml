services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: collector_db
    volumes:
      - ./init-db/init.sql:/docker-entrypoint-initdb.d/init.sql:z
      - postgres_data:/var/lib/postgresql/data:z
    healthcheck: # Vérifie que la DB est prête avant de lancer l'API
      test: ["CMD-SHELL", "pg_isready -U user -d collector_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://user:password@db:5432/collector_db
    depends_on:
      db:
        condition: service_healthy
  proxy:
    image: nginx:alpine
    ports:
      - "8080:80" # On mappe le port local 8080 sur le 80 du conteneur
      - "8443:443" # On mappe le port local 8443 sur le 443 du conteneur
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:z
      - ./nginx/server.crt:/etc/nginx/certs/server.crt:z
      - ./nginx/server.key:/etc/nginx/certs/server.key:z
    depends_on:
      - app

volumes:
  postgres_data:
