services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: collector_db
    volumes:
      - ./init-db/init.sql:/docker-entrypoint-initdb.d/init.sql:z 
      - postgres_data:/var/lib/postgresql/data:z
    healthcheck: # Vérifie que la DB est prête avant de lancer l'API
      test: ["CMD-SHELL", "pg_isready -U user -d collector_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://user:password@db:5432/collector_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: