# Regles specifiques au scan zap-api-scan (openapi.yaml)
# Format: <rule id>	<threshold>	# commentaire
#
# 100001 (Unexpected Content-Type was returned) : l'app sert la SPA React
# en HTML sur "/", en plus des endpoints JSON de l'API. Le spider de
# zap-api-scan explore ce chemin bien qu'il ne fasse pas partie de la
# spec OpenAPI, ce qui genere un faux positif structurel sur cette route.
100001	IGNORE	Unexpected Content-Type was returned
